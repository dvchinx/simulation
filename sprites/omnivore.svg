<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- cuerpo hexagonal morado -->
  <polygon points="8,1.5 13,4.5 13,11.5 8,14.5 3,11.5 3,4.5" fill="#a03cc8"/>
  <!-- ojos compuestos: uno verde (herbívoro) uno rojo (depredador) -->
  <circle cx="5.8" cy="7.5" r="1.6" fill="white"/>
  <circle cx="10.2" cy="7.5" r="1.6" fill="white"/>
  <circle cx="5.8" cy="7.5" r="0.85" fill="#00c864"/>
  <circle cx="10.2" cy="7.5" r="0.85" fill="#dc3c3c"/>
  <!-- pupila -->
  <circle cx="6.1" cy="7.7" r="0.4" fill="#111"/>
  <circle cx="10.5" cy="7.7" r="0.4" fill="#111"/>
  <!-- mandíbula adaptable -->
  <path d="M6 11 Q8 12.5 10 11" stroke="#7020a0" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- colmillo pequeño -->
  <polygon points="7.5,11.5 8,12.8 8.5,11.5" fill="#c8a0e0"/>
</svg>
