<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Life Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #ccc;
      display: flex;
      height: 100vh;
      font-family: monospace;
      font-size: 13px;
    }
    #view {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    canvas {
      image-rendering: pixelated;
      width: min(600px, 100%);
      aspect-ratio: 1 / 1;
      height: auto;
      will-change: transform;
    }
    #sidebar {
      width: 260px;
      background: #1a1a1a;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 12px;
    }
    #tick-display {
      font-size: 22px;
      color: #eee;
      margin-bottom: 16px;
    }
    .meter { margin-bottom: 10px; }
    .meter-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .meter-name { color: #aaa; }
    .meter-count { color: #eee; font-weight: bold; }
    .meter-bar-bg {
      background: #2a2a2a;
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
    }
    .meter-bar {
      height: 6px;
      border-radius: 2px;
      width: 0%;
      transition: width 0.9s ease;
    }
    #changelog-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .evo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      margin-top: 2px;
    }
    .evo-table th, .evo-table td {
      padding: 2px 4px;
      text-align: right;
    }
    .evo-table td:first-child { text-align: left; color: #888; width: 54px; }
    .evo-table th:first-child { text-align: left; }
    .evo-table th { color: #555; font-size: 10px; }
    .evo-table td { color: #bbb; }
    #changelog {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #666;
      font-size: 11px;
    }
    #status {
      position: fixed;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: #444;
    }

    /* Mobile: layout vertical */
    @media (max-width: 640px) {
      body {
        flex-direction: column;
        height: 100dvh;
      }
      #view {
        flex: none;
        padding: 8px 8px 0;
      }
      /* Canvas limitado por alto para dejar espacio al sidebar */
      canvas {
        width: auto;
        height: 42vh;
        max-width: calc(100vw - 16px);
      }
      #sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid #2a2a2a;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .sidebar-section {
        padding: 8px 12px;
      }
      #tick-display {
        font-size: 16px;
        margin-bottom: 8px;
      }
      /* Stats en fila horizontal */
      .meters-row {
        display: flex;
        gap: 12px;
      }
      .meters-row .meter {
        flex: 1;
        margin-bottom: 0;
      }
      #changelog-section {
        padding: 10px 12px;
        flex: none;
        overflow-y: visible;
      }
    }
  </style>
</head>
<body>
  <div id="view">
    <canvas id="canvas" width="200" height="200"></canvas>
  </div>
  <div id="sidebar">
    <div class="sidebar-section">
      <h2>Simulación</h2>
      <div id="tick-display">Tick 0</div>

      <div class="meters-row">
        <div class="meter">
          <div class="meter-header">
            <span class="meter-name">Herbív. A</span>
            <span class="meter-count" id="herb-a-count">0</span>
          </div>
          <div class="meter-bar-bg">
            <div class="meter-bar" id="herb-a-bar" style="background:#00c864"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-header">
            <span class="meter-name">Depred.</span>
            <span class="meter-count" id="pred-count">0</span>
          </div>
          <div class="meter-bar-bg">
            <div class="meter-bar" id="pred-bar" style="background:#dc3c3c"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-header">
            <span class="meter-name">Herbív. B</span>
            <span class="meter-count" id="herb-b-count">0</span>
          </div>
          <div class="meter-bar-bg">
            <div class="meter-bar" id="herb-b-bar" style="background:#3c8cdc"></div>
          </div>
        </div>
      </div>

      <div class="meters-row" style="margin-top:8px">
        <div class="meter">
          <div class="meter-header">
            <span class="meter-name">Infectados</span>
            <span class="meter-count" id="infected-count">0</span>
          </div>
          <div class="meter-bar-bg">
            <div class="meter-bar" id="infected-bar" style="background:#c8c800"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-header">
            <span class="meter-name">Pasto</span>
            <span class="meter-count" id="food-count">0</span>
          </div>
          <div class="meter-bar-bg">
            <div class="meter-bar" id="food-bar" style="background:#1e5c1e"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" id="evolution-section">
      <h2>Evolución — genes medios</h2>
      <table class="evo-table">
        <thead>
          <tr>
            <th></th>
            <th style="color:#00c864">HerbA</th>
            <th style="color:#dc3c3c">Pred</th>
            <th style="color:#3c8cdc">HerbB</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Velocidad</td> <td id="ea-0">—</td><td id="ep-0">—</td><td id="eb-0">—</td></tr>
          <tr><td>Reprod.</td>   <td id="ea-1">—</td><td id="ep-1">—</td><td id="eb-1">—</td></tr>
          <tr><td>Eficienc.</td> <td id="ea-2">—</td><td id="ep-2">—</td><td id="eb-2">—</td></tr>
          <tr><td>Visión</td>    <td id="ea-3">—</td><td id="ep-3">—</td><td id="eb-3">—</td></tr>
          <tr><td>Mutación</td>  <td id="ea-4">—</td><td id="ep-4">—</td><td id="eb-4">—</td></tr>
        </tbody>
      </table>
    </div>

    <div id="changelog-section">
      <h2>Changelog</h2>
      <div id="changelog">Cargando...</div>
    </div>
  </div>

  <div id="status">Conectando...</div>
  <script src="client.js"></script>
</body>
</html>
